<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Whoami Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="c"></canvas>
<div class="noise"></div>

<div id="enter" onclick="doEnter()">
  <div class="enter-prompt">[ запуск системы ]</div>
  <div class="enter-name">whoami<span class="enter-cursor"></span></div>
  <div class="enter-tag">разработчик · осинтер · opsec спец</div>
  <div class="tap-ring"><div class="tap-dot"></div></div>
  <div class="tap-label">tap to enter</div>
</div>

<div id="app">
  <div class="avatar-wrap">
    <div class="avatar-glow"></div>
    <div class="avatar-img">
      <img src="ava.jpeg" alt="avatar">
    </div>
  </div>

  <div class="profile-name">
    <span class="name-prefix">~/</span>whoami
  </div>
  <div class="profile-bio">
    разработчик<span class="bio-dot">·</span>осинтер<span class="bio-dot">·</span>opsec спец
  </div>

  <div class="links">
    <a class="link-btn" href="https://t.me/naciszt" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 1 0 24 12 12 12 0 0 0 11.944 0zm5.927 7.794-2.024 9.532c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12l-6.871 4.326-2.962-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.887.689z"/></svg>
      Telegram
    </a>
    <a class="link-btn" href="https://github.com/naciszt" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
      GitHub
    </a>
    <a class="link-btn" href="ton://transfer/murderdoxer.ton/" target="_blank" rel="noopener">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><title>Ton SVG Icon</title><path fill="currentColor" d="m20.661 7.22l-7.846 12.494a1.06 1.06 0 0 1-1.794-.006L3.328 7.214A2.2 2.2 0 0 1 3 6.05a2.29 2.29 0 0 1 2.324-2.255h13.362C19.963 3.794 21 4.8 21 6.044c0 .413-.116.82-.339 1.175M5.218 6.8l5.723 8.826V5.912H5.816c-.592 0-.857.392-.598.89m7.84 8.826L18.783 6.8c.265-.497-.006-.89-.599-.89H13.06z"/></svg>
      Донат
    </a>
    <a class="link-btn" href="https://t.me/thewinnerjoke" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      Projects
    </a>
  </div>

  <!-- плеер типо музычка -->
  <div id="player">
    <div class="player-cover-row">
      <img id="cover-img" src="cover.jpg" alt="cover">
      <div class="track-meta">
        <div class="track-title" id="t-title">song name</div>
        <div class="track-artist" id="t-artist">artist</div>
      </div>
      <div class="viz" id="viz"></div>
    </div>

    <div class="progress-wrap">
      <span class="time-label" id="t-cur">0:00</span>
      <div class="progress-bar" id="prog-bar">
        <div class="progress-fill" id="prog-fill"></div>
      </div>
      <span class="time-label" id="t-dur">0:00</span>
    </div>

    <div class="controls">
      <button class="ctrl" id="prev-btn" title="Prev">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="ctrl main" id="play-btn" title="Play">
        <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl" id="next-btn" title="Next">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2.5-6 5.5 3.9V8.1L8.5 12zM16 6h2v12h-2z"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="foot">// whoami · online</div>

<script src="script.js"></script>
</body>
</html>
